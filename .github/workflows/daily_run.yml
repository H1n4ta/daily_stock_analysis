name: Daily Stock Analysis

on:
  workflow_dispatch:  # 仅允许手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Configure environment
      run: |
        # 复制环境变量模板并替换为secrets中的配置
        cp .env.example .env
        echo "STOCK_LIST=${{ secrets.STOCK_LIST }}" >> .env
        echo "ANSPIRE_API_KEYS=${{ secrets.ANSPIRE_API_KEYS }}" >> .env
        echo "FEISHU_WEBHOOK_URL=${{ secrets.FEISHU_WEBHOOK_URL }}" >> .env
        echo "SCHEDULE_ENABLED=false" >> .env   # 关闭定时执行
        echo "SCHEDULE_TIME=18:00" >> .env
        
    - name: Run daily analysis
      run: python main.py --force-run
