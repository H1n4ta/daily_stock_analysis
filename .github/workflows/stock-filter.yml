name: Stock Filter Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天下午2点运行（UTC+8）
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-stock-filter:
    runs-on: ubuntu-latest
    name: Run Stock Filter

    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas akshare

    - name: Run stock filter
      run: |
        python stock_filter.py --no-sector-filter

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: stock-filter-results
        path: daily_stock_analysis/filtered_stocks_*.csv
